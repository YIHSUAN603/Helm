name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # tsc type-check + vite build
      - run: npm run build

      # node:test suites in tests/*.test.ts
      - run: npm test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential curl wget file

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # tauri's generate_context! requires frontendDist (../dist) to exist at
      # compile time; a stub avoids running the full vite build in this job.
      - name: Stub frontendDist for tauri codegen
        run: mkdir -p dist && touch dist/index.html

      - name: rustfmt
        run: cargo fmt --check
        working-directory: src-tauri

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      # default_shell_spawns_in_pty falls back to /bin/zsh on Unix, which is
      # not installed on GitHub runners — point it at bash explicitly.
      - name: cargo test
        run: cargo test
        working-directory: src-tauri
        env:
          AITERMINAL_SHELL: /bin/bash
